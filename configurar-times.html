<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Configurar times - CAMIMICA Jogo de Mímica">
    <meta name="keywords" content="jogo, mimica, times, configuração">
    <meta name="author" content="CAMIMICA">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Configurar Times - CAMIMICA">
    <meta property="og:description" content="Configure os times para começar a jogar">
    <meta property="og:type" content="website">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <title>Configurar Times - CAMIMICA</title>
</head>
<body>
    <!-- Background Animation -->
    <div class="background-animation">
        <div class="floating-element floating-element--1"></div>
        <div class="floating-element floating-element--2"></div>
        <div class="floating-element floating-element--3"></div>
        <div class="floating-element floating-element--4"></div>
        <div class="floating-element floating-element--5"></div>
    </div>

    <!-- Header -->
    <header class="config-header">
        <button class="back-button" onclick="goBack()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 12L5 12M5 12L12 5M5 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Voltar
        </button>
        
        <div class="header-content">
            <div class="logo-small">
                <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="url(#gradient1)"/>
                    <path d="M30 40C30 40 40 30 50 40C60 30 70 40 70 40" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="35" cy="35" r="3" fill="white"/>
                    <circle cx="65" cy="35" r="3" fill="white"/>
                    <path d="M35 60C35 60 42 65 50 60C58 65 65 60 65 60" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#FF6B6B"/>
                            <stop offset="100%" style="stop-color:#4ECDC4"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="page-title">Configurar Times</h1>
            <p class="page-subtitle">Defina quantos times e jogadores participarão</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="config-main">
        <form id="configForm" class="config-form">
            <!-- Number of Teams Section -->
            <section class="config-section">
                <div class="section-header">
                    <div class="section-icon">
                        <svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="15" cy="15" r="5" fill="var(--primary-color)"/>
                            <circle cx="25" cy="15" r="5" fill="var(--secondary-color)"/>
                            <circle cx="20" cy="25" r="5" fill="var(--accent-color)"/>
                            <path d="M15 20L20 25L25 20" stroke="var(--text-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div>
                        <h2 class="section-title">Quantos Times?</h2>
                        <p class="section-description">Escolha entre 2 e 4 times</p>
                    </div>
                </div>
                
                <div class="selector-container">
                    <div class="number-selector" id="teamsSelector">
                        <button type="button" class="selector-button selector-minus" onclick="decrementTeams()">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                        <div class="selector-display">
                            <span class="number-value" id="teamsValue">2</span>
                            <span class="number-label">Times</span>
                        </div>
                        <button type="button" class="selector-button selector-plus" onclick="incrementTeams()">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M4 10H16M10 4V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="team-preview" id="teamPreview">
                        <div class="preview-dot active">👥</div>
                        <div class="preview-dot active">👥</div>
                        <div class="preview-dot">👥</div>
                        <div class="preview-dot">👥</div>
                    </div>
                </div>
            </section>

            <!-- Players per Team Section -->
            <section class="config-section">
                <div class="section-header">
                    <div class="section-icon">
                        <svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="4" fill="var(--white)"/>
                            <path d="M12 18C8 18 4 20 4 24V26H20V24C20 20 16 18 12 18Z" fill="var(--white)" opacity="0.7"/>
                            <circle cx="28" cy="12" r="4" fill="var(--gray-900)"/>
                            <path d="M28 18C24 18 20 20 20 24V26H36V24C36 20 32 18 28 18Z" fill="var(--gray-900)" opacity="0.7"/>
                        </svg>
                    </div>
                    <div>
                        <h2 class="section-title">Jogadores por Time</h2>
                        <p class="section-description">Entre 1 e 4 jogadores por time</p>
                    </div>
                </div>
                
                <div class="selector-container">
                    <div class="number-selector" id="playersSelector">
                        <button type="button" class="selector-button selector-minus" onclick="decrementPlayers()">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                        <div class="selector-display">
                            <span class="number-value" id="playersValue">2</span>
                            <span class="number-label">Jogadores</span>
                        </div>
                        <button type="button" class="selector-button selector-plus" onclick="incrementPlayers()">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M4 10H16M10 4V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="players-preview" id="playersPreview">
                        <div class="player-icon active">👤</div>
                        <div class="player-icon active">👤</div>
                        <div class="player-icon">👤</div>
                        <div class="player-icon">👤</div>
                    </div>
                </div>
            </section>

            <!-- Game Summary -->
            <section class="summary-section">
                <div class="summary-card">
                    <h3>Resumo do Jogo</h3>
                    <div class="summary-content">
                        <div class="summary-item">
                            <span class="summary-icon">👥</span>
                            <span class="summary-text">
                                <strong id="totalTeams">2</strong> times
                            </span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-icon">👤</span>
                            <span class="summary-text">
                                <strong id="totalPlayers">4</strong> jogadores no total
                            </span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Action Buttons -->
            <section class="action-section">
                <button type="button" class="secondary-button" onclick="resetConfig()">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 10C4 6.686 6.686 4 10 4C13.314 4 16 6.686 16 10C16 13.314 13.314 16 10 16C7.314 16 4.686 13.314 4.686 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M4 4V8H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Redefinir
                </button>
                
                <button type="submit" class="primary-button">
                    Avançar
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 10L16 10M16 10L9 3M16 10L9 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </section>
        </form>
    </main>

    <!-- Hidden inputs for form submission -->
    <input type="hidden" id="teamsInput" name="teams" value="2">
    <input type="hidden" id="playersInput" name="players" value="2">

    <!-- JavaScript -->
    <script src="js/main.js"></script>
</body>
</html>
